<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗑️ Borrador Masivo - Todos los archivos</title>
    <style>
        /* ===== ESTILO CYBERPUNK ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #f0f2f5;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(11, 14, 20, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            margin-top: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00f0ff, #b114ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .sub {
            text-align: center;
            color: #8a90a0;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .sub i {
            color: #ff1a6b;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-row label {
            min-width: 70px;
            font-weight: 600;
            color: #00f0ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 14px;
            color: #fff;
            font-family: inherit;
            transition: 0.2s;
            min-width: 150px;
        }
        .input-row input:focus {
            border-color: #00f0ff;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
        }
        .input-row input[type="text"] {
            flex: 2;
        }
        .actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 16px 0 20px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            flex: 1;
            justify-content: center;
            min-width: 140px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00f0ff, #0066ff);
            color: #000;
        }
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            transform: translateY(-3px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff1a6b, #cc0044);
            color: #fff;
        }
        .btn-danger:hover {
            box-shadow: 0 0 30px rgba(255, 26, 107, 0.4);
            transform: translateY(-3px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .file-list-container {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 16px;
        }
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .file-list-header h3 {
            color: #8a90a0;
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .file-list-header .badge {
            background: rgba(0, 240, 255, 0.15);
            color: #00f0ff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .file-list {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 0;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            transition: 0.15s;
        }
        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .file-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00f0ff;
            cursor: pointer;
            flex-shrink: 0;
        }
        .file-item .path {
            flex: 1;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            color: #ccc;
            word-break: break-all;
        }
        .file-item .size {
            color: #666;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .file-item .type-icon {
            color: #666;
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #8a90a0;
            font-size: 0.9rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .status-box .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status-box .ok { color: #00ff9d; }
        .status-box .err { color: #ff1a6b; }
        .status-box .info { color: #ffd700; }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #555;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 16px;
        }
        .footer-note i {
            color: #ffd700;
        }
        .select-all-row {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 6px 14px;
            background: rgba(0, 240, 255, 0.04);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .select-all-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00f0ff;
        }
        .select-all-row label {
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .input-row { flex-direction: column; align-items: stretch; }
            .input-row label { min-width: auto; }
            .btn { min-width: 100%; }
            .file-item { flex-wrap: wrap; }
            .file-item .size { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🗑️ BORRADOR MASIVO</h1>
    <p class="sub"><i class="fas fa-skull"></i> Elimina archivos de GitHub en 1 commit · <span style="color:#00f0ff;">Todos los archivos visibles</span></p>

    <!-- CONFIGURACIÓN -->
    <div class="input-group">
        <div class="input-row">
            <label><i class="fas fa-key"></i> Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxx" value="">
        </div>
        <div class="input-row">
            <label><i class="fas fa-code-branch"></i> Repo</label>
            <input type="text" id="repoInput" placeholder="usuario/repo" value="Archinime/-Archinime-">
            <label style="min-width:60px;"><i class="fas fa-branch"></i> Rama</label>
            <input type="text" id="branchInput" placeholder="main" value="main" style="flex:0.5; min-width:100px;">
        </div>
    </div>

    <!-- ACCIONES -->
    <div class="actions">
        <button class="btn btn-primary" id="scanBtn"><i class="fas fa-search"></i> Ver todos los archivos</button>
        <button class="btn btn-danger" id="deleteBtn" disabled><i class="fas fa-trash-alt"></i> Eliminar seleccionados</button>
        <button class="btn btn-secondary" id="clearBtn" disabled><i class="fas fa-times"></i> Deseleccionar todos</button>
    </div>

    <!-- ESTADO -->
    <div class="status-box" id="statusBox">
        <span id="statusText">🔍 Ingresa tu token y haz clic en "Ver todos los archivos".</span>
    </div>

    <!-- LISTA DE ARCHIVOS -->
    <div class="file-list-container" id="fileListContainer" style="display:none;">
        <div class="file-list-header">
            <h3><i class="fas fa-files"></i> Archivos encontrados <span id="countBadge" class="badge">0</span></h3>
            <span id="selectedCount" style="color:#8a90a0; font-size:0.85rem;">Seleccionados: 0</span>
        </div>
        <div class="select-all-row">
            <input type="checkbox" id="selectAllCheckbox">
            <label for="selectAllCheckbox">Seleccionar / Deseleccionar todos</label>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> El token solo se guarda en tu navegador (localStorage). No se envía a servidores externos.
    </div>
</div>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    (function() {
        "use strict";

        // DOM refs
        const tokenInput = document.getElementById('tokenInput');
        const repoInput = document.getElementById('repoInput');
        const branchInput = document.getElementById('branchInput');
        const scanBtn = document.getElementById('scanBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');
        const fileListDiv = document.getElementById('fileList');
        const countBadge = document.getElementById('countBadge');
        const selectedCountSpan = document.getElementById('selectedCount');
        const fileListContainer = document.getElementById('fileListContainer');
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');

        // Estado
        let allFiles = [];           // { path, sha, type, size, mode }
        let selectedPaths = new Set();

        // ===== UTILIDADES =====
        function setStatus(msg, type = 'info') {
            const box = document.getElementById('statusBox');
            statusText.innerHTML = msg;
            // Limpiar clases anteriores
            box.querySelectorAll('.ok, .err, .info, .spinner').forEach(el => el.remove());
            if (type === 'loading') {
                const spin = document.createElement('div');
                spin.className = 'spinner';
                box.prepend(spin);
            } else if (type === 'ok') {
                const span = document.createElement('span');
                span.className = 'ok';
                span.innerHTML = '✅';
                box.prepend(span);
            } else if (type === 'err') {
                const span = document.createElement('span');
                span.className = 'err';
                span.innerHTML = '❌';
                box.prepend(span);
            } else if (type === 'info') {
                const span = document.createElement('span');
                span.className = 'info';
                span.innerHTML = 'ℹ️';
                box.prepend(span);
            }
        }

        function getHeaders(token) {
            return {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            };
        }

        async function apiFetch(url, token, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    ...getHeaders(token),
                    ...(options.headers || {})
                }
            });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text.slice(0, 150)}`);
            }
            return res.json();
        }

        // ===== OBTENER ÁRBOL COMPLETO (recursivo) =====
        async function getFullTree(token, repo, branch) {
            // 1. Obtener ref de la rama
            const refUrl = `https://api.github.com/repos/${repo}/git/refs/heads/${branch}`;
            const refData = await apiFetch(refUrl, token);
            const commitSha = refData.object.sha;

            // 2. Obtener el commit
            const commitUrl = `https://api.github.com/repos/${repo}/git/commits/${commitSha}`;
            const commitData = await apiFetch(commitUrl, token);
            const treeSha = commitData.tree.sha;

            // 3. Obtener el árbol recursivo
            const treeUrl = `https://api.github.com/repos/${repo}/git/trees/${treeSha}?recursive=1`;
            const treeData = await apiFetch(treeUrl, token);

            return {
                commitSha,
                treeSha,
                tree: treeData.tree || []
            };
        }

        // ===== ESCANEAR TODOS LOS ARCHIVOS =====
        async function scanAllFiles() {
            const token = tokenInput.value.trim();
            const repo = repoInput.value.trim();
            const branch = branchInput.value.trim();

            if (!token) { setStatus('⚠️ Ingresa tu token de GitHub.', 'err'); return; }
            if (!repo) { setStatus('⚠️ Ingresa el repositorio (usuario/repo).', 'err'); return; }

            setStatus('⏳ Conectando a GitHub y obteniendo todos los archivos...', 'loading');
            scanBtn.disabled = true;
            deleteBtn.disabled = true;
            clearBtn.disabled = true;

            try {
                const { commitSha, treeSha, tree } = await getFullTree(token, repo, branch);

                // Filtrar solo archivos (blob), excluir directorios
                const fileItems = tree.filter(item => item.type === 'blob');

                if (fileItems.length === 0) {
                    setStatus('⚠️ No se encontraron archivos en este repositorio/rama.', 'err');
                    fileListDiv.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">📭 Repositorio vacío.</div>';
                    countBadge.textContent = '0';
                    selectedCountSpan.textContent = 'Seleccionados: 0';
                    fileListContainer.style.display = 'block';
                    scanBtn.disabled = false;
                    return;
                }

                allFiles = fileItems.map(item => ({
                    path: item.path,
                    sha: item.sha,
                    type: item.type,
                    size: item.size || 0,
                    mode: item.mode || '100644'
                }));

                // Ordenar alfabéticamente
                allFiles.sort((a, b) => a.path.localeCompare(b.path));

                // Seleccionar todos por defecto (para facilitar)
                selectedPaths = new Set(allFiles.map(f => f.path));

                // Renderizar lista
                renderFileList(allFiles);

                setStatus(`✅ Encontrados ${allFiles.length} archivos. Puedes seleccionar/deseleccionar.`, 'ok');
                countBadge.textContent = allFiles.length;
                updateSelectedCount();
                deleteBtn.disabled = false;
                clearBtn.disabled = false;
                fileListContainer.style.display = 'block';

                // Marcar "Seleccionar todos" como checked
                selectAllCheckbox.checked = true;

            } catch (error) {
                console.error(error);
                setStatus(`❌ Error: ${error.message}`, 'err');
                fileListDiv.innerHTML = `<div style="color:#ff1a6b;padding:12px;">${error.message}</div>`;
                fileListContainer.style.display = 'block';
            } finally {
                scanBtn.disabled = false;
            }
        }

        // ===== RENDERIZAR LISTA =====
        function renderFileList(files) {
            if (!files || files.length === 0) {
                fileListDiv.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">No hay archivos.</div>';
                return;
            }

            let html = '';
            files.forEach(file => {
                const checked = selectedPaths.has(file.path) ? 'checked' : '';
                const sizeKB = file.size > 0 ? (file.size / 1024).toFixed(1) + ' KB' : '—';
                // Icono según extensión
                let icon = '📄';
                if (file.path.endsWith('.js')) icon = '📜';
                else if (file.path.endsWith('.html') || file.path.endsWith('.htm')) icon = '🌐';
                else if (file.path.endsWith('.css')) icon = '🎨';
                else if (file.path.endsWith('.json')) icon = '📋';
                else if (file.path.endsWith('.md')) icon = '📝';
                else if (file.path.endsWith('.png') || file.path.endsWith('.jpg') || file.path.endsWith('.jpeg') || file.path.endsWith('.gif')) icon = '🖼️';
                else if (file.path.endsWith('.mp4') || file.path.endsWith('.webm')) icon = '🎬';
                else if (file.path.endsWith('.mp3') || file.path.endsWith('.wav')) icon = '🎵';
                else if (file.path.includes('/')) icon = '📁';

                html += `
                    <div class="file-item">
                        <input type="checkbox" ${checked} data-path="${file.path}" onchange="toggleFileSelection('${file.path}')">
                        <span class="type-icon">${icon}</span>
                        <span class="path">${file.path}</span>
                        <span class="size">${sizeKB}</span>
                    </div>
                `;
            });
            fileListDiv.innerHTML = html;
        }

        // ===== SELECCIÓN INDIVIDUAL =====
        window.toggleFileSelection = function(path) {
            if (selectedPaths.has(path)) selectedPaths.delete(path);
            else selectedPaths.add(path);
            updateSelectedCount();
            updateSelectAllState();
            // Actualizar visual del checkbox
            const checkbox = document.querySelector(`.file-item input[data-path="${path}"]`);
            if (checkbox) checkbox.checked = selectedPaths.has(path);
        };

        // ===== SELECCIONAR / DESELECCIONAR TODOS =====
        function toggleSelectAll() {
            const checked = selectAllCheckbox.checked;
            if (checked) {
                selectedPaths = new Set(allFiles.map(f => f.path));
            } else {
                selectedPaths.clear();
            }
            // Actualizar todos los checkboxes
            document.querySelectorAll('.file-item input[type="checkbox"]').forEach(cb => {
                cb.checked = checked;
            });
            updateSelectedCount();
            deleteBtn.disabled = (selectedPaths.size === 0);
        }

        // ===== ACTUALIZAR CONTADOR =====
        function updateSelectedCount() {
            const count = selectedPaths.size;
            selectedCountSpan.textContent = `Seleccionados: ${count}`;
            deleteBtn.disabled = (count === 0);
            if (count === 0) clearBtn.disabled = true;
            else clearBtn.disabled = false;
        }

        function updateSelectAllState() {
            const allChecked = allFiles.every(f => selectedPaths.has(f.path));
            selectAllCheckbox.checked = allChecked;
        }

        // ===== ELIMINAR SELECCIONADOS =====
        async function deleteSelectedFiles() {
            const token = tokenInput.value.trim();
            const repo = repoInput.value.trim();
            const branch = branchInput.value.trim();

            if (!token || !repo) {
                setStatus('⚠️ Configura token y repositorio.', 'err');
                return;
            }

            if (selectedPaths.size === 0) {
                setStatus('⚠️ Selecciona al menos un archivo.', 'err');
                return;
            }

            // Confirmar
            if (!confirm(`⚠️ ¿Eliminar DEFINITIVAMENTE ${selectedPaths.size} archivo(s)?\nEsta acción no se puede deshacer fácilmente.`)) return;

            setStatus(`⏳ Eliminando ${selectedPaths.size} archivos...`, 'loading');
            deleteBtn.disabled = true;
            scanBtn.disabled = true;
            clearBtn.disabled = true;

            try {
                // 1. Obtener árbol actual completo
                const { commitSha, treeSha, tree } = await getFullTree(token, repo, branch);

                // 2. Filtrar: conservar todos los elementos EXCEPTO los seleccionados
                const newTreeElements = tree.filter(item => {
                    // Si es un blob y está en la lista de seleccionados, lo excluimos
                    if (item.type === 'blob' && selectedPaths.has(item.path)) {
                        return false;
                    }
                    return true;
                });

                // 3. Crear nuevo árbol
                const createTreeUrl = `https://api.github.com/repos/${repo}/git/trees`;
                const treePayload = {
                    base_tree: treeSha,
                    tree: newTreeElements.map(item => ({
                        path: item.path,
                        mode: item.mode || '100644',
                        type: item.type || 'blob',
                        sha: item.sha
                    }))
                };
                const treeData = await apiFetch(createTreeUrl, token, {
                    method: 'POST',
                    body: JSON.stringify(treePayload)
                });
                const newTreeSha = treeData.sha;

                // 4. Crear commit
                const commitUrl = `https://api.github.com/repos/${repo}/git/commits`;
                const commitPayload = {
                    message: `Eliminar ${selectedPaths.size} archivo(s) desde web`,
                    tree: newTreeSha,
                    parents: [commitSha]
                };
                const commitData = await apiFetch(commitUrl, token, {
                    method: 'POST',
                    body: JSON.stringify(commitPayload)
                });
                const newCommitSha = commitData.sha;

                // 5. Actualizar la rama
                const refUrl = `https://api.github.com/repos/${repo}/git/refs/heads/${branch}`;
                await apiFetch(refUrl, token, {
                    method: 'PATCH',
                    body: JSON.stringify({ sha: newCommitSha, force: false })
                });

                setStatus(`✅ ¡Éxito! Commit creado: ${newCommitSha.slice(0,8)}. Se eliminaron ${selectedPaths.size} archivos.`, 'ok');
                // Añadir enlace
                const link = document.createElement('a');
                link.href = `https://github.com/${repo}/commit/${newCommitSha}`;
                link.target = '_blank';
                link.style.color = '#00f0ff';
                link.textContent = ' Ver commit en GitHub';
                statusText.appendChild(link);

                // Limpiar selección y recargar
                selectedPaths.clear();
                allFiles = [];
                renderFileList([]);
                countBadge.textContent = '0';
                selectedCountSpan.textContent = 'Seleccionados: 0';
                deleteBtn.disabled = true;
                clearBtn.disabled = true;
                selectAllCheckbox.checked = false;

            } catch (error) {
                console.error(error);
                setStatus(`❌ Error al eliminar: ${error.message}`, 'err');
            } finally {
                deleteBtn.disabled = false;
                scanBtn.disabled = false;
                clearBtn.disabled = false;
            }
        }

        // ===== LIMPIAR SELECCIÓN =====
        function clearSelection() {
            selectedPaths.clear();
            document.querySelectorAll('.file-item input[type="checkbox"]').forEach(cb => cb.checked = false);
            updateSelectedCount();
            selectAllCheckbox.checked = false;
            deleteBtn.disabled = true;
            clearBtn.disabled = true;
            setStatus('🧹 Selección limpiada.', 'info');
        }

        // ===== EVENTOS =====
        scanBtn.addEventListener('click', scanAllFiles);
        deleteBtn.addEventListener('click', deleteSelectedFiles);
        clearBtn.addEventListener('click', clearSelection);
        selectAllCheckbox.addEventListener('change', toggleSelectAll);

        // Cargar token desde localStorage
        const savedToken = localStorage.getItem('gh_token');
        if (savedToken) tokenInput.value = savedToken;
        tokenInput.addEventListener('change', () => {
            localStorage.setItem('gh_token', tokenInput.value);
        });

        // Al cargar, poner un placeholder
        setStatus('🔍 Ingresa tu token y haz clic en "Ver todos los archivos".');

        console.log('🗑️ Borrador Masivo - Todos los archivos listo.');
    })();
</script>

</body>
</html>
