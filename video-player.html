<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <title>Reproductor - Archinime</title>
  <link rel="icon" href="Logo_Archinime.png" type="image/png">

<script>
  (function() {
    // PALETA "SYNTHWAVE": Solo colores fríos y neones que combinan con la galaxia
    const colors = [
      "#00f3ff", // Cian Neón (Inicio)
      "#0066ff", // Azul Eléctrico
      "#bc13fe", // Morado Protagonista
      "#ff0055", // Rosa Neón (Acento)
      "#bc13fe", // Morado (Regreso)
      "#0066ff", // Azul
      "#00f3ff"  // Cian (Final para loop perfecto)
    ];

    const animationDuration = 20000; // 6 segundos (igual que el CSS nuevo)
    const intervalTime = 20; 
    const segments = colors.length - 1;
    const step = (intervalTime / animationDuration) * segments;

    let currentProgress = 0;
    let metaTag = document.querySelector('meta[name="theme-color"]');
    if (!metaTag) {
      metaTag = document.createElement('meta');
      metaTag.name = "theme-color";
      document.head.appendChild(metaTag);
    }

    const hexToRgb = (hex) => {
      const bigint = parseInt(hex.slice(1), 16);
      return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
    };
    const rgbToHex = (r, g, b) => {
      return "#" + [r, g, b].map(x => {
        const hex = Math.round(x).toString(16);
        return hex.length === 1 ? "0" + hex : hex;
      }).join('');
    };

    const lerp = (start, end, t) => start + (end - start) * t;
    setInterval(() => {
      currentProgress += step;
      if (currentProgress >= segments) {
        currentProgress = currentProgress % segments;
      }

      const index = Math.floor(currentProgress);
      const t = currentProgress - index;
      const colorStart = hexToRgb(colors[index]);
      const colorEnd = hexToRgb(colors[index + 1]);

      const r = lerp(colorStart[0], colorEnd[0], t);
      const g = lerp(colorStart[1], colorEnd[1], t);
      const b = lerp(colorStart[2], colorEnd[2], t);

      metaTag.setAttribute('content', rgbToHex(r, g, b));
    }, intervalTime);
  })();
</script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- VARIABLES --- */
    :root {
        --primary-color: #00fff7;
        /* Celeste Fluorescente (Cyan) */
        --accent-color: #ff0055;
        /* Rosado Fluorescente (Neon Pink) */
        --text-color: #ffffff;
        --glass-bg: rgba(0, 0, 0, 0.7);
        --glass-border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* --- ESTILOS GENERALES --- */
    body { 
        margin: 0;
        background: #050505; 
        color: var(--text-color); 
        font-family: 'Poppins', sans-serif; 
        overflow-x: hidden; 
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
        outline: none;
    }
   
    /* --- FONDO DE VIDEO --- */
    #bg-video { 
        position: fixed;
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        object-fit: cover;
        z-index: -10; 
        opacity: 0.5;
    }

    /* --- OVERLAY --- */
    #overlay {
      position: fixed;
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      z-index: -5;
      background: radial-gradient(circle at center, rgba(123, 44, 191, 0.15) 0%, #000000 90%);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    
    /* --- CONTENEDOR PRINCIPAL --- */
    .container { 
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px;
        position: relative;
        z-index: 10;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    
    /* --- NAVEGACIÓN SUPERIOR --- */
    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;
        margin-bottom: 5px;
        flex-wrap: wrap;
        gap: 10px;
        background: linear-gradient(to bottom, rgba(140, 82, 255, 0.3), transparent);
        padding: 10px;
        border-radius: 0 0 15px 15px;
        border-bottom: 1px solid rgba(140, 82, 255, 0.2);
    }

    /* BOTÓN VOLVER (ESTILO NEON) */
    .back-btn { 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #eee;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid rgba(0, 255, 247, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .back-btn:hover {
        background: rgba(0, 255, 247, 0.15);
        border-color: var(--primary-color);
        color: #fff;
        box-shadow: 0 0 20px var(--primary-color), inset 0 0 10px rgba(0, 255, 247, 0.2);
        transform: translateY(-2px);
        text-shadow: 0 0 5px var(--primary-color);
    }
   
    /* --- REPRODUCTOR --- */
    .player-wrapper { 
        position: relative;
        padding-bottom: 56.25%; /* 16:9 */
        height: 0; 
        width: 100%; 
        background: #000;
        overflow: hidden;
        z-index: 50;
        border-radius: 16px; 
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    }
   
    .player-wrapper iframe, .player-wrapper video { 
        position: absolute;
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        border: none;
    }

    /* --- TIRA PROTECTORA (LOGO BLOCKER) - AHORA PERMANENTE --- */
    .logo-blocker {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 14%; /* Tapa un 14% de la pantalla (ideal para logos) */
        min-height: 45px;
        /* Altura mínima en móviles pequeños */
        background: linear-gradient(to bottom, rgba(5, 5, 5, 1) 0%, rgba(5, 5, 5, 0.85) 40%, transparent 100%);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 100; /* Siempre encima del video */
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 1.5%; /* Espaciado adaptable */
        pointer-events: auto;
        /* IMPORTANTE: Esto bloquea los clics hacia el iframe */
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        user-select: none; /* Evita que seleccionen el texto */
        opacity: 1;
        visibility: visible;
    }

    /* Línea sutil de neón debajo del bloqueador */
    .logo-blocker::after {
        content: '';
        position: absolute;
        bottom: 25%;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        opacity: 0.3;
    }

    .blocker-content {
        display: flex;
        align-items: baseline;
        gap: 8px;
    }

    .blocker-text {
        font-family: 'Poppins', sans-serif;
        font-weight: 800;
        font-size: clamp(1rem, 2.5vw, 1.4rem); /* Texto responsivo */
        color: #fff;
        letter-spacing: 5px;
        text-transform: uppercase;
        text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
        animation: neonPulse 2s infinite alternate;
    }

    .blocker-sub {
        font-family: 'Poppins', sans-serif;
        font-size: clamp(0.6rem, 1.2vw, 0.8rem);
        color: var(--accent-color);
        font-weight: 700;
        letter-spacing: 2px;
        text-shadow: 0 0 8px var(--accent-color);
    }

    @keyframes neonPulse {
        0% { opacity: 0.8;
        text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color); }
        100% { opacity: 1;
        text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
        }
    }

    /* --- OPCIONES DE SERVIDOR --- */
    .options { 
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }
    
    .opt-btn { 
        font-size: 0.8rem;
        padding: 6px 14px;
        border: 1px solid rgba(255,255,255,0.2); 
        background: rgba(0, 0, 0, 0.6);
        color: #ccc;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
    }
    
    .opt-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }

    .opt-btn.active { 
        border-color: var(--primary-color);
        color: #000;
        background: var(--primary-color); 
        font-weight: 700;
        box-shadow: 0 0 15px var(--primary-color);
    }

    /* --- TÍTULO DEL EPISODIO --- */
    h1 { 
        color: #fff;
        font-size: 1.3rem; 
        margin: 5px 0 15px 0;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* --- CONTROLES --- */
    .controls { 
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 15px; 
        margin-top: 10px;
        padding-bottom: 40px;
        width: 100%;
    }
    
    #prevBtn { justify-self: start; }
    #nextBtn { justify-self: end;
    }
    #downloadBtn { justify-self: center; cursor: pointer;
    }

    /* ESTILOS DE LOS BOTONES */
    .btn { 
        padding: 12px 28px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        text-decoration: none; 
        border-radius: 50px; 
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        backdrop-filter: blur(5px);
        font-weight: 600;
        min-width: 100px;
    }
    
    .nav-btn {
        border-color: rgba(0, 255, 247, 0.3);
    }

    .nav-btn:hover {
        background: rgba(0, 255, 247, 0.15);
        border-color: var(--primary-color);
        color: #fff;
        box-shadow: 0 0 25px var(--primary-color), inset 0 0 10px rgba(0, 255, 247, 0.2);
        transform: scale(1.05);
        text-shadow: 0 0 8px var(--primary-color);
    }

    #downloadBtn {
        border-color: rgba(255, 0, 85, 0.4);
        background: rgba(255, 0, 85, 0.05);
        min-width: 140px;
    }

    #downloadBtn:hover {
        background: rgba(255, 0, 85, 0.2);
        border-color: var(--accent-color);
        color: #fff;
        box-shadow: 0 0 30px var(--accent-color), inset 0 0 10px rgba(255, 0, 85, 0.2);
        transform: scale(1.05);
        text-shadow: 0 0 8px var(--accent-color);
    }

    .btn-hidden { 
        visibility: hidden;
        pointer-events: none;
    }

    /* --- MEDIA QUERIES --- */
    @media (max-width: 768px) {
        .container { padding: 10px;
        }
        .top-nav { justify-content: space-between;
        }
        .options {
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
            max-width: 60%;
        }
        .options::-webkit-scrollbar { display: none;
        }

        .controls {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto; 
            gap: 10px;
        }

        #prevBtn { grid-column: 1; grid-row: 1;
        justify-self: start; width: auto; }
        #nextBtn { grid-column: 2; grid-row: 1; justify-self: end;
        width: auto; }
        #downloadBtn { grid-column: 1 / -1; grid-row: 2; width: 100%;
        box-sizing: border-box; }
        
        /* Ajuste fino para la tira en móviles - Agrandada según lo pedido */
        .logo-blocker {
            height: 20%;
            /* Aumentado de 17% a 20% */
            min-height: 60px;
            /* Aumentado de 52px a 60px */
            padding-top: 4%;
        }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline poster="galaxia-morado1.avif">
    <source src="galaxia.mp4" type="video/mp4">
  </video>

  <div id="overlay"></div>

  <div class="container">
   
    <div class="top-nav">
       <a href="#" id="backLink" class="back-btn">
         <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
         Volver
       </a>
       <div class="options" id="serverOptions"></div>
    
    </div>

    <div class="player-wrapper" id="playerContainer">
        <div class="logo-blocker">
            <div class="blocker-content">
                <span class="blocker-text">ARCHINIME</span>
                <span class="blocker-sub">HD</span>
            </div>
        </div>
        
        <div id="mediaContainer" style="width: 100%; height: 100%;"></div>
    </div>

    <h1 id="epTitle">Cargando...</h1>

    <div class="controls">
        <a id="prevBtn" class="btn nav-btn btn-hidden">⏮ Ant.</a>
        
        <a id="downloadBtn" class="btn">
            ⬇ Descargar
        </a>
        
        <a id="nextBtn" class="btn nav-btn btn-hidden">Sig.
        ⏭</a>
   
     </div>

  </div>

  <script>
    var version = new Date().getTime();
    document.write('<script src="video-player-data.js?v=' + version + '"><\/script>');
  </script>

  <script>
    // -----------------------------------------------------------
    // LÓGICA DEL REPRODUCTOR
    // -----------------------------------------------------------
    
    const DB = (typeof players !== 'undefined') ? players : {};
    
    const params = new URLSearchParams(location.search);
    const animeId = params.get('anime');
    const season = params.get('s');
    const episode = params.get('e');
    const backLink = document.getElementById('backLink');

    if (animeId && season && episode) {
        const viewedKey = `watched_${animeId}_${season}_${episode}`;
        localStorage.setItem(viewedKey, 'true');
    }
    
    if (backLink && animeId) {
        backLink.href = `anime-detail.html?id=${animeId}`;
    }

    const epData = DB[animeId]?.[season]?.[episode];
    if (epData) {
        document.title = `Ver ${epData.title} - Archinime`;
        document.getElementById('epTitle').innerText = epData.title;
        const initialLink = epData.link || epData.link2;
        loadVideo(initialLink);
        
        const optContainer = document.getElementById('serverOptions');
        optContainer.innerHTML = '';
        if(epData.link) createOptionBtn("Latino", epData.link, true);
        if(epData.link2) createOptionBtn("Opcion 2", epData.link2, !epData.link);
        
        updateDownloadButton(initialLink);
        setupNavigation();
    } else {
        document.getElementById('epTitle').innerText = "No encontrado";
    }

    // --- DETECCIÓN DE TABLET ---
    function isTabletDevice() {
        const ua = navigator.userAgent.toLowerCase();
        const isIpad = /ipad/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroidTablet = /android/i.test(ua) && !/mobile/i.test(ua);
        const isGenericTablet = /tablet/i.test(ua);
        return isIpad || isAndroidTablet || isGenericTablet;
    }

    // --- FORZAR LA DESCARGA OCULTA EN SEGUNDO PLANO ---
    function forceDownload(url) {
        let iframe = document.getElementById('hiddenDownloader');
        if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'hiddenDownloader';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
        }
        iframe.src = url;
    }

    // --- LÓGICA DE DESCARGA ---
    function generateDirectDownloadLink(url) {
        if (!url) return "#";
        if (url.includes("drive.google.com")) {
            const match = url.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
               return `https://drive.usercontent.google.com/download?id=${match[1]}&export=download&authuser=0`;
            }
            const altMatch = url.match(/id=([a-zA-Z0-9_-]+)/);
            if (altMatch && altMatch[1]) {
               return `https://drive.usercontent.google.com/download?id=${altMatch[1]}&export=download&authuser=0`;
            }
        }
        if (url.includes("dropbox.com") && url.includes("dl=0")) {
             return url.replace('dl=0', 'dl=1');
        }
        if (url.includes("ok.ru/")) {
            const match = url.match(/ok\.ru\/video(?:embed)?\/(\d+)/);
            if (match && match[1]) {
                return `https://anydownloader.com/en/#url=https://ok.ru/video/${match[1]}`;
            }
        }
        if (url.includes("odysee.com")) {
            let claimStr = url.split("/embed/")[1];
            if (claimStr) {
                claimStr = claimStr.replace(':', '/');
                return `https://odysee.com/$/download/${claimStr}`;
            }
            return url;
        }
        return url;
    }

    function updateDownloadButton(url) {
        const dlBtn = document.getElementById('downloadBtn');
        const newBtn = dlBtn.cloneNode(true);
        dlBtn.parentNode.replaceChild(newBtn, dlBtn);
        
        const directLink = generateDirectDownloadLink(url);
        newBtn.href = directLink || '#';
        
        if(directLink && directLink !== '#') {
            // Lógica para OK.ru (AnyDownloader)
            if (directLink.includes("anydownloader.com")) {
                newBtn.setAttribute("target", "_blank");
            } else {
                newBtn.removeAttribute("target");
                
                // Lógica de tablet y descarga forzada SOLO para Odysee
                if (url.includes("odysee.com")) {
                    newBtn.onclick = function(e) {
                        e.preventDefault();
                        if (isTabletDevice()) {
                            prompt("Tu dispositivo es una Tablet. Copia el siguiente enlace y pégalo manualmente en una nueva pestaña para descargar el episodio:", directLink);
                        } else {
                            forceDownload(directLink);
                        }
                    };
                }
                // Para Google Drive y Dropbox, al no haber onclick, el navegador maneja
                // el 'href' de forma nativa, evitando los bloqueos de seguridad del iframe.
            }
        }
    }

    function createOptionBtn(label, url, isActive) {
        const optContainer = document.getElementById('serverOptions');
        const btn = document.createElement('button');
        const isFirst = optContainer.children.length === 0;
        const shouldBeActive = isActive || isFirst;
        btn.className = 'opt-btn' + (shouldBeActive ? ' active' : '');
        btn.innerText = label;
        btn.onclick = () => {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadVideo(url);
            updateDownloadButton(url);
        };
        optContainer.appendChild(btn);
    }

    function loadVideo(url) {
        // Ahora solo limpiamos el contenedor de video, no toda la caja protectora
        const container = document.getElementById('mediaContainer');
        container.innerHTML = ''; 
        if (!url) return;

        const isVideoFile = /\.(mp4|webm|ogg|mov|m3u8)$/i.test(url);
        const isDrive = url.includes('drive.google.com') && url.includes('/preview');
        if (isVideoFile && !isDrive) {
            const video = document.createElement('video');
            video.src = url;
            video.controls = true;
            video.autoplay = false;
            video.playsInline = true; 
            video.style.width = "100%";
            video.style.height = "100%";
            video.onerror = function() { loadAsIframe(url, container); };
            
            container.appendChild(video);
        } else {
            loadAsIframe(url, container);
        }
    }

    function loadAsIframe(url, container) {
        container.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.setAttribute("allow", "autoplay; fullscreen; encrypted-media; picture-in-picture");
        iframe.setAttribute("allowfullscreen", "true");
        iframe.style.position = "absolute";
        iframe.style.top = "0";
        iframe.style.left = "0";
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";
        container.appendChild(iframe);
    }

    function setupNavigation() {
        try {
            if (DB[animeId]) {
                let flatList = [];
                const seasons = Object.keys(DB[animeId]).sort((a, b) => Number(a) - Number(b));
                seasons.forEach(sKey => {
                    const episodes = Object.keys(DB[animeId][sKey]).sort((a, b) => Number(a) - Number(b));
                    episodes.forEach(eKey => {
                        flatList.push({ s: sKey, e: eKey });
          
                    });
                });
                const currentIndex = flatList.findIndex(item => String(item.s) === String(season) && String(item.e) === String(episode));
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                if (currentIndex > 0) {
                    const prevItem = flatList[currentIndex - 1];
                    prevBtn.classList.remove('btn-hidden');
                    prevBtn.href = `?anime=${animeId}&s=${prevItem.s}&e=${prevItem.e}`;
                } else {
                    prevBtn.classList.add('btn-hidden');
                }

                if (currentIndex !== -1 && currentIndex < flatList.length - 1) {
                    const nextItem = flatList[currentIndex + 1];
                    nextBtn.classList.remove('btn-hidden');
                    nextBtn.href = `?anime=${animeId}&s=${nextItem.s}&e=${nextItem.e}`;
                } else {
                    nextBtn.classList.add('btn-hidden');
                }
            }
        } catch (e) { console.error(e);
        }
    }
  </script>
</body>
</html>
