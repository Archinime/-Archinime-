<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <title>Reproductor - Archinime</title>
  <link rel="icon" href="Logo_Archinime.png" type="image/png">

<script>
  (function() {
    // PALETA "SYNTHWAVE": Solo colores fríos y neones que combinan con la galaxia
    const colors = [
      "#00f3ff", "#0066ff", "#bc13fe", "#ff0055", "#bc13fe", "#0066ff", "#00f3ff"
    ];

    const animationDuration = 20000; // 20s
    const intervalTime = 20;
    const segments = colors.length - 1;
    const step = (intervalTime / animationDuration) * segments;

    let currentProgress = 0;
    let metaTag = document.querySelector('meta[name="theme-color"]');
    if (!metaTag) {
      metaTag = document.createElement('meta');
      metaTag.name = "theme-color";
      document.head.appendChild(metaTag);
    }

    const hexToRgb = (hex) => {
      const bigint = parseInt(hex.slice(1), 16);
      return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
    };

    const rgbToHex = (r, g, b) => {
      return "#" + [r, g, b].map(x => {
        const hex = Math.round(x).toString(16);
        return hex.length === 1 ? "0" + hex : hex;
      }).join('');
    };

    const lerp = (start, end, t) => start + (end - start) * t;

    setInterval(() => {
      currentProgress += step;
      if (currentProgress >= segments) currentProgress = currentProgress % segments;

      const index = Math.floor(currentProgress);
      const t = currentProgress - index;
      const colorStart = hexToRgb(colors[index]);
      const colorEnd = hexToRgb(colors[index + 1]);

      const r = lerp(colorStart[0], colorEnd[0], t);
      const g = lerp(colorStart[1], colorEnd[1], t);
      const b = lerp(colorStart[2], colorEnd[2], t);

      metaTag.setAttribute('content', rgbToHex(r, g, b));
    }, intervalTime);
  })();
</script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary-color:#00fff7;
      --accent-color:#ff0055;
      --text-color:#ffffff;
    }
    *{box-sizing:border-box}
    body{margin:0;background:#050505;color:var(--text-color);font-family:'Poppins',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
    #bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-10;opacity:.5}
    #overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-5;background:radial-gradient(circle at center,rgba(123,44,191,0.15) 0%,#000 90%);backdrop-filter:blur(8px);pointer-events:none}
    .container{width:100%;max-width:1200px;margin:0 auto;padding:15px;position:relative;z-index:10;display:flex;flex-direction:column;gap:15px}
    .top-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:10px;background:linear-gradient(to bottom,rgba(140,82,255,0.3),transparent);padding:10px;border-radius:0 0 15px 15px;border-bottom:1px solid rgba(140,82,255,0.2)}
    .back-btn{display:inline-flex;align-items:center;gap:8px;color:#eee;text-decoration:none;font-weight:600;font-size:.85rem;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);padding:8px 18px;border-radius:50px;border:1px solid rgba(0,255,247,.3);transition:all .3s;box-shadow:0 0 10px rgba(0,0,0,.5)}
    .back-btn:hover{background:rgba(0,255,247,.15);border-color:var(--primary-color);color:#fff;box-shadow:0 0 20px var(--primary-color);transform:translateY(-2px)}
    .player-wrapper{position:relative;padding-bottom:56.25%;height:0;width:100%;background:#000;overflow:hidden;z-index:50;border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 50px rgba(0,0,0,.9);transition:cursor .3s}
    .player-wrapper:fullscreen,.player-wrapper:-webkit-full-screen{padding-bottom:0!important;height:100vh!important;width:100vw!important;border-radius:0!important;border:none!important}
    #playerContainer{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-weight:600;padding:12px}
    .player-wrapper iframe,.player-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .player-patch{position:absolute;z-index:60;background:transparent;cursor:default}
    .main-patch{width:100%;left:0;top:0;height:7%}
    .corner-patch{bottom:0;right:0;width:100px;height:70px}
    .player-wrapper.hide-cursor{cursor:none}
    .player-wrapper.hide-cursor #customFullscreenBtn{opacity:0;pointer-events:none}
    .fullscreen-btn{position:absolute;bottom:0;right:0;background:#000;border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:16px;border-radius:10px 0 0 0;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;transition:all .2s}
    h1{color:#fff;font-size:1.3rem;margin:5px 0 15px 0;text-align:center;font-weight:700;letter-spacing:.5px;text-shadow:0 0 10px rgba(255,255,255,.3)}
    .controls{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:15px;margin-top:10px;padding-bottom:40px;width:100%}
    .btn{padding:12px 28px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:#fff;text-decoration:none;border-radius:50px;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .3s;backdrop-filter:blur(5px);font-weight:600;min-width:100px}
    .nav-btn{border-color:rgba(0,255,247,.3)}
    .nav-btn:hover{background:rgba(0,255,247,.15);border-color:var(--primary-color);color:#fff;box-shadow:0 0 25px var(--primary-color);transform:scale(1.05)}
    #downloadBtn{border-color:rgba(255,0,85,.4);background:rgba(255,0,85,.05);min-width:140px}
    #downloadBtn:hover{background:rgba(255,0,85,.2);border-color:var(--accent-color);color:#fff;box-shadow:0 0 30px var(--accent-color);transform:scale(1.05)}
    .btn-hidden{visibility:hidden;pointer-events:none}
    .options{display:flex;gap:10px;justify-content:flex-end}
    .opt-btn{font-size:.8rem;padding:6px 14px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);color:#ccc;cursor:pointer;border-radius:8px;transition:all .3s;display:inline-flex;align-items:center;justify-content:center;font-weight:500}
    .opt-btn:hover{background:rgba(255,255,255,.1);color:#fff}
    .opt-btn.active{border-color:var(--primary-color);color:#000;background:var(--primary-color);font-weight:700;box-shadow:0 0 15px var(--primary-color)}
    @media (max-width:768px){
      .fullscreen-btn{padding:10px;border-radius:6px}
      .fullscreen-btn svg{width:22px;height:22px}
      .corner-patch{width:45px;height:50px}
      .controls{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:10px}
      #downloadBtn{grid-column:1 / -1;grid-row:2;width:100%;box-sizing:border-box}
      .options{max-width:60%;overflow-x:auto;white-space:nowrap;-ms-overflow-style:none;scrollbar-width:none}
      .options::-webkit-scrollbar{display:none}
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline poster="galaxia-morado1.avif">
    <source src="galaxia.mp4" type="video/mp4">
  </video>

  <div id="overlay"></div>

  <div class="container">
   
    <div class="top-nav">
       <a href="#" id="backLink" class="back-btn" aria-label="Volver">
         <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
         Volver
       </a>
       <div class="options" id="serverOptions" aria-hidden="false"></div>
    </div>

    <div class="player-wrapper" id="playerWrapper" role="region" aria-label="Reproductor">
        <div id="playerContainer" aria-live="polite"></div>
        
        <div class="player-patch main-patch" aria-hidden="true"></div>
        <div class="player-patch corner-patch" aria-hidden="true"></div>

        <button id="customFullscreenBtn" class="fullscreen-btn" title="Pantalla Completa" aria-pressed="false" type="button">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
    </div>

    <h1 id="epTitle">Cargando...</h1>

    <div class="controls">
      <a id="prevBtn" class="btn nav-btn btn-hidden" aria-hidden="true">⏮ Ant.</a>
        
        <a id="downloadBtn" class="btn" href="#" download>
             ⬇ Descargar
        </a>
        
        <a id="nextBtn" class="btn nav-btn btn-hidden" aria-hidden="true">Sig. ⏭</a>
    </div>

  </div>

  <script>
    // Cache-busting para video-player-data.js
    var version = new Date().getTime();
    document.write('<script src="video-player-data.js?v=' + version + '"><\/script>');
  </script>

  <script>
    // -----------------------------------------------------------
    // LÓGICA DEL REPRODUCTOR (SIN NINGUNA APERTURA DE NUEVA PESTAÑA)
    // -----------------------------------------------------------

    const DB = (typeof players !== 'undefined') ? players : {};

    const params = new URLSearchParams(location.search);
    const animeId = params.get('anime');
    const season = params.get('s');
    const episode = params.get('e');
    const backLink = document.getElementById('backLink');

    if (animeId && season && episode) {
        const viewedKey = `watched_${animeId}_${season}_${episode}`;
        localStorage.setItem(viewedKey, 'true');
    }

    if (backLink && animeId) {
        backLink.href = `anime-detail.html?id=${animeId}`;
    }

    const epData = DB[animeId]?.[season]?.[episode];
    if (epData) {
        document.title = `Ver ${epData.title} - Archinime`;
        document.getElementById('epTitle').innerText = epData.title;
        const initialLink = epData.link || epData.link2;

        // Cargar siempre embebido (iframe o video)
        loadVideo(initialLink);

        const optContainer = document.getElementById('serverOptions');
        optContainer.innerHTML = '';
        if (epData.link) createOptionBtn("Latino", epData.link, true);
        if (epData.link2) createOptionBtn("Sub", epData.link2, !epData.link);

        updateDownloadButton(initialLink);
        setupNavigation();

    } else {
        document.getElementById('epTitle').innerText = "No encontrado";
    }

    function generateDirectDownloadLink(url) {
        if (!url) return "#";
        
        // Google Drive logic
        if (url.includes("drive.google.com")) {
            const match = url.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
               return `https://drive.usercontent.google.com/download?id=${match[1]}&export=download&authuser=0`;
            }
            const altMatch = url.match(/id=([a-zA-Z0-9_-]+)/);
            if (altMatch && altMatch[1]) {
               return `https://drive.usercontent.google.com/download?id=${altMatch[1]}&export=download&authuser=0`;
            }
        }
        
        // Dropbox logic
        if (url.includes("dropbox.com") && url.includes("dl=0")) {
             return url.replace('dl=0', 'dl=1');
        }

        // --- NUEVA LÓGICA PARA OK.RU ---
        if (url.includes("ok.ru/")) {
            // Esta expresión regular extrae el ID, ya sea que la URL use "/videoembed/" o "/video/"
            const match = url.match(/ok\.ru\/video(?:embed)?\/(\d+)/);
            if (match && match[1]) {
                return `https://anydownloader.com/en/#url=https://ok.ru/video/${match[1]}`;
            }
        }
        // -------------------------------
        
        return url;
    }

    function updateDownloadButton(url) {
        const dlBtn = document.getElementById('downloadBtn');
        const directLink = generateDirectDownloadLink(url);
        dlBtn.href = directLink || '#';
        
        // Opcional: Si es un enlace de AnyDownloader, lo abrimos en nueva pestaña para que no cierre el reproductor
        if(directLink && directLink.includes("anydownloader.com")) {
            dlBtn.setAttribute("target", "_blank");
        } else {
            dlBtn.removeAttribute("target");
        }
    }

    function createOptionBtn(label, url, isActive) {
        const optContainer = document.getElementById('serverOptions');
        const btn = document.createElement('button');
        const isFirst = optContainer.children.length === 0;
        const shouldBeActive = isActive || isFirst;

        btn.className = 'opt-btn' + (shouldBeActive ? ' active' : '');
        btn.innerText = label;
        btn.type = 'button';

        btn.addEventListener('click', () => {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateDownloadButton(url);
            loadVideo(url);
        });

        optContainer.appendChild(btn);
    }

    function loadVideo(url) {
        const container = document.getElementById('playerContainer');
        container.innerHTML = '';
        if (!url) return;

        const isVideoFile = /\.(mp4|webm|ogg|mov|m3u8)$/i.test(url);
        const isDrivePreview = url.includes('drive.google.com') && url.includes('/preview');

        if (isVideoFile && !isDrivePreview) {
            const video = document.createElement('video');
            video.src = url;
            video.controls = true;
            video.autoplay = false;
            video.playsInline = true;
            video.style.width = "100%";
            video.style.height = "100%";

            video.onerror = function() { loadAsIframe(url, container); };
            container.appendChild(video);
        } else {
            loadAsIframe(url, container);
        }
    }

    function loadAsIframe(url, container) {
        container.innerHTML = '';
        let finalUrl = url || '';

        // Forzamos HTTPS si es http para evitar bloqueos por "contenido mixto"
        if (finalUrl.startsWith('http://')) finalUrl = finalUrl.replace('http://', 'https://');

        const iframe = document.createElement('iframe');
        iframe.src = finalUrl;
        iframe.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");
        iframe.style.position = "absolute";
        iframe.style.top = "0";
        iframe.style.left = "0";
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";

        container.appendChild(iframe);
    }

    function setupNavigation() {
        try {
            if (DB[animeId]) {
                let flatList = [];
                const seasons = Object.keys(DB[animeId]).sort((a, b) => Number(a) - Number(b));
                seasons.forEach(sKey => {
                    const episodes = Object.keys(DB[animeId][sKey]).sort((a, b) => Number(a) - Number(b));
                    episodes.forEach(eKey => flatList.push({ s: sKey, e: eKey }));
                });

                const currentIndex = flatList.findIndex(item => String(item.s) === String(season) && String(item.e) === String(episode));
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');

                if (currentIndex > 0) {
                    const prevItem = flatList[currentIndex - 1];
                    prevBtn.classList.remove('btn-hidden');
                    prevBtn.href = `?anime=${animeId}&s=${prevItem.s}&e=${prevItem.e}`;
                    prevBtn.setAttribute('aria-hidden','false');
                } else {
                    prevBtn.classList.add('btn-hidden');
                    prevBtn.setAttribute('aria-hidden','true');
                }

                if (currentIndex !== -1 && currentIndex < flatList.length - 1) {
                    const nextItem = flatList[currentIndex + 1];
                    nextBtn.classList.remove('btn-hidden');
                    nextBtn.href = `?anime=${animeId}&s=${nextItem.s}&e=${nextItem.e}`;
                    nextBtn.setAttribute('aria-hidden','false');
                } else {
                    nextBtn.classList.add('btn-hidden');
                    nextBtn.setAttribute('aria-hidden','true');
                }
            }
        } catch (e) { console.error(e); }
    }

    // -----------------------------------------------------------
    // PANTALLA COMPLETA
    // -----------------------------------------------------------
    const wrapper = document.getElementById('playerWrapper');
    const fsBtn = document.getElementById('customFullscreenBtn');

    fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (wrapper.requestFullscreen) wrapper.requestFullscreen();
            else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
            else if (wrapper.msRequestFullscreen) wrapper.msRequestFullscreen();
            fsBtn.setAttribute('aria-pressed','true');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            fsBtn.setAttribute('aria-pressed','false');
        }
    });

    function updateFsButton() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            fsBtn.innerHTML = '<svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>';
        } else {
            fsBtn.innerHTML = '<svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>';
        }
    }
    document.addEventListener('fullscreenchange', updateFsButton);
    document.addEventListener('webkitfullscreenchange', updateFsButton);

    // -----------------------------------------------------------
    // AUTO-OCULTAR CURSOR Y CONTROLES
    // -----------------------------------------------------------
    let hideTimeout;

    function resetInactivityTimer() {
        wrapper.classList.remove('hide-cursor');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => wrapper.classList.add('hide-cursor'), 3000);
    }

    wrapper.addEventListener('mousemove', resetInactivityTimer);
    wrapper.addEventListener('click', resetInactivityTimer);
    document.addEventListener('touchstart', resetInactivityTimer, { passive: true });
    document.addEventListener('touchmove', resetInactivityTimer, { passive: true });
    window.addEventListener('blur', () => resetInactivityTimer());
    wrapper.addEventListener('mouseleave', () => { clearTimeout(hideTimeout); wrapper.classList.add('hide-cursor'); });

    // iniciar
    resetInactivityTimer();

  </script>
</body>
</html>
