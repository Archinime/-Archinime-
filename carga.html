<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ARCHINIME · Cargando</title>
  
  <!-- Fuentes y estilos base (igual que en index.html) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === Variables (igual que en index) */
    :root {
      --bg-deep: #05070a;
      --neon-blue: #00f0ff;
      --neon-purple: #b114ff;
      --neon-pink: #ff1a6b;
      --neon-gold: #ffd700;
      --text-primary: #f0f2f5;
      --text-secondary: #8a90a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      margin: 0;
    }

    /* === LOADER === */
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 100000;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #loadingScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-ring {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--neon-blue);
      border-right-color: var(--neon-purple);
      animation: spinLoader 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
      margin-bottom: 30px;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
      will-change: transform;
    }

    .loader-ring::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: var(--neon-pink);
      border-left-color: var(--neon-gold);
      animation: spinLoader 0.8s linear infinite reverse;
    }

    @keyframes spinLoader {
      to { transform: rotate(360deg); }
    }

    /* GIF dentro del círculo */
    .gif-container {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 2;
    }

    .gif-container img {
      width: 70%;
      height: 70%;
      object-fit: contain;
      border-radius: 50%;
      background: var(--bg-deep);
      transition: opacity 0.4s ease;
      will-change: transform;
    }

    .loader-title {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #fff, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px rgba(0, 240, 255, 0.3);
      margin-bottom: 10px;
      font-family: 'Orbitron', sans-serif;
    }

    .loader-sub {
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 4px;
      margin-bottom: 20px;
      font-family: 'Poppins', sans-serif;
    }

    .loader-bar {
      width: 300px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0, 240, 255, 0.1);
    }

    .loader-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple), var(--neon-blue));
      border-radius: 10px;
      transition: width 0.2s linear;
      box-shadow: 0 0 20px var(--neon-blue);
    }

    .loader-percent {
      font-family: 'Orbitron', monospace;
      color: var(--neon-blue);
      font-size: 1rem;
      margin-top: 12px;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Botón de prueba (igual que antes) */
    .close-btn {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 24px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .close-btn:hover {
      background: var(--neon-blue);
      color: var(--bg-deep);
      box-shadow: 0 0 20px var(--neon-blue);
    }

    @media (max-width: 480px) {
      .loader-ring { width: 120px; height: 120px; }
      .loader-title { font-size: 2rem; letter-spacing: 6px; }
      .loader-sub { font-size: 0.7rem; }
      .loader-bar { width: 200px; }
    }
  </style>
</head>
<body>

<!-- ===== PANTALLA DE CARGA ===== -->
<div id="loadingScreen">
  <div class="loader-ring">
    <div class="gif-container" id="gifContainer">
      <img id="gifDisplay" src="" alt="GIF de carga">
    </div>
  </div>

  <div class="loader-title">ARCHINIME</div>
  <div class="loader-sub">INICIALIZANDO SISTEMA</div>
  <div class="loader-bar"><div class="loader-bar-fill" id="loaderLine"></div></div>
  <div class="loader-percent" id="loadingPercentage">0%</div>

  <!-- Botón para cerrar (simular fin) -->
  <button class="close-btn" onclick="cerrarLoader()">Cerrar (simular fin)</button>
</div>

<!-- ===== SCRIPTS ===== -->
<!-- Incluir gifs.js externo (si existe) o definirlo aquí -->
<script>
  // Si existe gifs.js externo, se cargará, pero por si acaso definimos la lista aquí
  // Para que funcione sin dependencias, definimos la lista de GIFs directamente.
  // Si quieres usar el archivo gifs.js, puedes comentar esta parte y descomentar la siguiente.
  
  // Opción 1: Definir localmente (para que funcione sin gifs.js)
  const listaDeGifs = [
    'chica_corriendo.gif',
    'https://cdn.jsdelivr.net/gh/Archinime/Archivos-data@main/gokuu.gif',
    'https://cdn.jsdelivr.net/gh/Archinime/Archivos-data@main/naruto.gif'
  ];

  // Opción 2: Si tienes gifs.js, descomenta la siguiente línea y comenta la de arriba:
  // const listaDeGifs = window.listaDeGifs || [];
</script>

<script>
  // ============================================
  // LÓGICA DEL LOADER (similar a la anterior pero mejor estructurada)
  // ============================================
  (function() {
    const loader = document.getElementById('loadingScreen');
    const gifImg = document.getElementById('gifDisplay');
    const percentText = document.getElementById('loadingPercentage');
    const barFill = document.getElementById('loaderLine');

    let currentGifIndex = 0;
    let progress = 0;
    let isFinished = false;
    let intervalId = null;
    let autoInterval = null;

    // Función para actualizar el progreso (0-100)
    function actualizarProgreso(valor) {
      if (isFinished) return;
      const clamped = Math.min(100, Math.max(0, Math.floor(valor)));
      progress = clamped;
      percentText.textContent = clamped + '%';
      barFill.style.width = clamped + '%';
    }

    // Cambiar GIF
    function cambiarGif() {
      if (isFinished) return;
      if (listaDeGifs.length === 0) return;

      const gifUrl = listaDeGifs[currentGifIndex];
      gifImg.src = gifUrl;
      gifImg.style.opacity = '0';
      setTimeout(() => {
        gifImg.style.opacity = '1';
      }, 50);

      currentGifIndex = (currentGifIndex + 1) % listaDeGifs.length;
    }

    // Función para finalizar el loader (se llama desde el botón o automáticamente)
    window.cerrarLoader = function() {
      if (isFinished) return;
      isFinished = true;
      clearInterval(autoInterval);
      clearInterval(intervalId);

      // Poner 100%
      actualizarProgreso(100);
      percentText.textContent = 'SISTEMA LISTO';

      // Ocultar con transición
      setTimeout(() => {
        loader.classList.add('hidden');
        document.body.style.overflow = '';
        // Opcional: redirigir a index.html después de ocultar
        // window.location.href = 'index.html';
      }, 700);
    };

    // Iniciar el cambio de GIFs cada 2 segundos
    cambiarGif(); // primero
    intervalId = setInterval(cambiarGif, 2000);

    // Simular progreso hasta 85%
    autoInterval = setInterval(() => {
      if (isFinished) {
        clearInterval(autoInterval);
        return;
      }
      if (progress < 85) {
        const inc = Math.random() * 8 + 1;
        actualizarProgreso(progress + inc);
      }
    }, 300);

    // Fallback: cerrar automáticamente después de 8 segundos (para prueba)
    setTimeout(() => {
      if (!isFinished) {
        window.cerrarLoader();
      }
    }, 8000);

    // Exponer función global para que se pueda llamar desde fuera
    window.loaderFinish = window.cerrarLoader;

    // Mostrar loader (por si acaso)
    loader.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

    console.log('🚀 Loader con GIFs iniciado.');
  })();
</script>

</body>
</html>
